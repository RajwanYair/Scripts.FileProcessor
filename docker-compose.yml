version: "3.8"

services:
  # Main API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fileprocessor-api
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./plugins:/app/plugins
      - ./logs:/app/logs
      - ./cache:/app/cache
      - ./config:/app/config
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://user:password@postgres:5432/fileprocessor
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    restart: unless-stopped
    networks:
      - fileprocessor-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: fileprocessor-postgres
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=fileprocessor
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - fileprocessor-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: fileprocessor-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - fileprocessor-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Apache Kafka (Event Bus)
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: fileprocessor-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - fileprocessor-network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: fileprocessor-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - fileprocessor-network

  # Celery Worker (Background Tasks)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fileprocessor-worker
    command: celery -A file_processor.tasks worker --loglevel=info --concurrency=4
    volumes:
      - ./uploads:/app/uploads
      - ./plugins:/app/plugins
      - ./logs:/app/logs
      - ./cache:/app/cache
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://user:password@postgres:5432/fileprocessor
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    restart: unless-stopped
    networks:
      - fileprocessor-network

  # Prometheus (Metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: fileprocessor-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - fileprocessor-network

  # Grafana (Dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: fileprocessor-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - fileprocessor-network

  # NGINX (Reverse Proxy & Load Balancer)
  nginx:
    image: nginx:alpine
    container_name: fileprocessor-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - fileprocessor-network

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  fileprocessor-network:
    driver: bridge
